name: Deploy to Supabase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Run database migrations
        run: supabase db push --include-all

      - name: Deploy Edge Function
        run: supabase functions deploy send-lead --no-verify-jwt

      - name: Set Edge Function secrets
        run: |
          supabase secrets set RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          supabase secrets set FROM_EMAIL="RemboursePro <onboarding@resend.dev>"
